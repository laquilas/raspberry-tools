# ==============================
# APP GERAL
# ==============================
APP_NAME="raspberry-tools"
ENV="prod"                  # dev | prod
LOG_LEVEL="info"           # debug | info | warn | error

# ==============================
# PATHS
# ==============================
BASE_DIR="/home/laquilas/tools"
DATA_DIR="$BASE_DIR/data"
LOG_DIR="$BASE_DIR/logs"
TMP_DIR="$BASE_DIR/tmp"

# ==============================
# GPS
# ==============================
GPS_ENABLED=true
GPS_DEVICE="/dev/ttyACM0"
GPS_INTERVAL=120              # segundos
GPS_MAX_ATTEMPTS=15
GPS_MIN_FIX=2                 # 2=2D | 3=3D

# ==============================
# STORAGE (SQLite)
# ==============================
DB_ENABLED=true
DB_TYPE="sqlite"
DB_PREFIX="gps"

# ==============================
# LOGGING
# ==============================
LOG_TO_FILE=true
LOG_FILE="$LOG_DIR/app.log"

# ==============================
# FUTURO (integrações)
# ==============================
API_ENABLED=false
API_URL=""
API_KEY=""

MQTT_ENABLED=false
MQTT_HOST=""
MQTT_PORT=1883
MQTT_TOPIC="gps/data"