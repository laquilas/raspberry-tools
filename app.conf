# ==============================
# APP GERAL
# ==============================
APP_NAME="raspberry-tools"
ENV="prod"                  # dev | prod
LOG_LEVEL="info"           # debug | info | warn | error

# ==============================
# PATHS
# ==============================
BASE_DIR="/home/laquilas/tools"
DATA_DIR="$BASE_DIR/data"
LOG_DIR="$BASE_DIR/logs"
TMP_DIR="$BASE_DIR/tmp"

# ==============================
# GPS
# ==============================
GPS_ENABLED=true
GPS_DEVICE="/dev/ttyACM0"
GPS_INTERVAL=120              # segundos
GPS_MAX_ATTEMPTS=15
GPS_MIN_FIX=2                 # 2=2D | 3=3D
GPS_LOG_EXTENDED=true         # salvar dados estendidos (alt, speed, etc)
GPS_REQUIRE_3D=false          # exigir fix 3D para salvar

# ==============================
# STORAGE (SQLite)
# ==============================
DB_ENABLED=true
DB_TYPE="sqlite"
DB_PREFIX="gps"

# ==============================
# LOGGING
# ==============================
LOG_TO_FILE=true
LOG_FILE="$LOG_DIR/app.log"

# ==============================
# WiFi / WIFITE
# ==============================
WIFI_ENABLED=true
WIFI_INTERFACE_AUTO=true          # detectar automaticamente
WIFI_INTERFACE_PREFERRED=""       # interface preferida (ex: wlan0)
WIFI_SCAN_TIMEOUT=30             # timeout para scan (segundos)
WIFI_ATTACK_TIMEOUT=300          # timeout para ataques (segundos)
WIFI_MAX_ATTEMPTS=3              # tentativas máximas por alvo
WIFI_WPS_ENABLED=true            # habilitar ataques WPS
WIFI_WPA_ENABLED=true            # habilitar ataques WPA
WIFI_DICT_PATH=""                # caminho para dicionário (opcional)
WIFI_LOG_ATTACKS=true            # log dos ataques realizados

# ==============================
# FUTURO (integrações)
# ==============================
API_ENABLED=false
API_URL=""
API_KEY=""

MQTT_ENABLED=false
MQTT_HOST=""
MQTT_PORT=1883
MQTT_TOPIC="gps/data"